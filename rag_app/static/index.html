<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Personal RAG Assistant</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; }
      #messages { border: 1px solid #ddd; padding: 1rem; height: 60vh; overflow: auto; background: #fafafa }
      .msg { margin: .5rem 0 }
      .user { font-weight: bold }
      .bot { color: #111 }
      #input { width: 100%; padding: .5rem; box-sizing: border-box }
      #send { margin-top: .5rem }
    </style>
  </head>
  <body>
    <h1>Personal RAG Assistant</h1>
    <div id="messages"></div>
    <textarea id="input" rows="3" placeholder="Ask something..."></textarea>
    <div>
      <button id="send">Send</button>
    </div>
    <hr />
    <div>
      <label for="fileinput">Upload documents (PDF, DOCX, TXT, MD):</label><br />
      <input id="fileinput" type="file" multiple />
      <button id="upload">Upload</button>
    </div>
    <script src="/static/main.js"></script>
  </body>
</html>

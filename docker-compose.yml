version: "3.8"

services:
  enterprise-rag:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-rag-platform:latest
    container_name: enterprise_rag_app
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=true
      - DATABASE_URL=sqlite:////app/data/rag_platform.db
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
    volumes:
      - enterprise_rag_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  enterprise_rag_data:
    driver: local
